<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salat Sedan Pro v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-hijri/2.1.2/moment-hijri.min.js"></script>
    <style>
        :root {
            --primary: #0b5351;
            --secondary: #00302e;
            --accent: #f1c40f;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
            --font-size: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: #121212;
            color: var(--white);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: var(--secondary);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* STICKY HEADER */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
        }

        #clock { font-size: 3.2rem; font-weight: 300; display: block; }
        .location-detail {
            color: var(--accent);
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* SCROLL CONTENT */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .prayer-list { padding: 10px 25px; }
        .prayer-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: var(--font-size);
        }
        .prayer-item.next {
            background: var(--glass);
            color: var(--accent);
            margin: 5px -25px;
            padding: 15px 25px;
            font-weight: bold;
        }

        .countdown-container {
            text-align: right;
            color: var(--accent);
            font-size: 0.85rem;
            padding: 10px 25px;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
        }

        /* CALENDAR */
        .calendar-area {
            background: var(--primary);
            padding: 20px;
            margin-top: 20px;
            border-radius: 30px 30px 0 0;
        }
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .day-name { font-size: 0.6rem; opacity: 0.5; text-align: center; padding-bottom: 5px;}
        .date { 
            padding: 10px 0; border-radius: 8px; font-size: 0.9rem; text-align: center;
            position: relative; background: rgba(255,255,255,0.03);
        }
        .date.today { background: var(--accent); color: #000; font-weight: bold; }
        .date.sun { color: #ff6b6b; }
        .hijri-mini { position: absolute; top: 2px; right: 3px; font-size: 0.5rem; opacity: 0.7; font-weight: normal; }
        .pasaran { display: block; font-size: 0.5rem; opacity: 0.6; }

        /* ICON FEATURES SECTION */
        .feature-box {
            background: rgba(0,0,0,0.3);
            margin: 15px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        /* QIBLA COMPASS */
        .compass-wrap {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            border: 4px double var(--accent);
            border-radius: 50%;
            transition: transform 0.1s ease-out;
        }
        .compass-arrow {
            position: absolute;
            top: 10%; left: 50%;
            width: 4px; height: 40%;
            background: var(--accent);
            transform-origin: bottom center;
            transform: translateX(-50%);
        }
        .compass-arrow::after {
            content: '▲';
            position: absolute;
            top: -15px; left: -6px;
            color: var(--accent);
        }

        /* SETTINGS & THEME */
        .settings-grid { text-align: left; font-size: 0.85rem; }
        .settings-grid input { width: 100%; margin: 8px 0 15px; cursor: pointer;}
        .btn-reset {
            background: var(--accent);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .icon-nav {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: var(--secondary);
            border-top: 1px solid var(--glass);
        }
        .icon-btn { font-size: 1.5rem; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); color: var(--accent); }

    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <span id="clock">00:00:00</span>
        <div class="location-detail" id="full-address">Mendeteksi Sedan...</div>
    </div>

    <div class="scrollable-content">
        <div class="prayer-list" id="prayer-content"></div>
        <div class="countdown-container" id="cd-text"></div>

        <div class="calendar-area">
            <div class="cal-header">
                <span onclick="moveMonth(-1)" style="cursor:pointer">❮</span>
                <span id="masehi-month">...</span>
                <span onclick="moveMonth(1)" style="cursor:pointer">❯</span>
            </div>
            <div class="grid" id="calendar-grid"></div>
        </div>

        <div class="feature-box" id="section-qibla">
            <h4 style="margin-bottom:15px">🧭 Kompas Kiblat Aktif</h4>
            <div class="compass-wrap" id="compass">
                <div class="compass-arrow"></div>
            </div>
            <p style="font-size: 0.7rem; margin-top: 10px; opacity: 0.6;">Arahkan HP Anda untuk mencari kiblat</p>
        </div>

        <div class="feature-box" id="section-settings">
            <h4 style="margin-bottom:15px">⚙️ Pengaturan & Tema</h4>
            <div class="settings-grid">
                <label>Ukuran Font Jadwal:</label>
                <input type="range" min="12" max="24" value="16" oninput="changeFontSize(this.value)">
                
                <label>Warna Tema:</label>
                <input type="color" id="colorPicker" onchange="changeTheme(this.value)">
                
                <button class="btn-reset" onclick="resetDefault()">Reset ke Default Sedan</button>
            </div>
        </div>

        <div class="feature-box" id="section-dev">
            <h4>👨‍💻 Developer Info</h4>
            <p style="font-size: 0.8rem; margin-top:10px">Sedan Precision App v6.0</p>
            <p style="font-size: 0.7rem; opacity: 0.6">Optimized for Kedungringin, Rembang</p>
        </div>
    </div>

    <div class="icon-nav">
        <div class="icon-btn" onclick="document.getElementById('section-qibla').scrollIntoView({behavior:'smooth'})">🧭</div>
        <div class="icon-btn" onclick="document.getElementById('section-settings').scrollIntoView({behavior:'smooth'})">⚙️</div>
        <div class="icon-btn" onclick="document.getElementById('section-dev').scrollIntoView({behavior:'smooth'})">🆔</div>
        <div class="icon-btn" onclick="location.reload()">🔄</div>
    </div>
</div>

<script>
    let viewDate = new Date();
    let currentPrayerTimes = [];
    let nextPrayerInfo = null;
    const DEFAULT_COLOR = "#0b5351";

    function updateLive() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        
        if (nextPrayerInfo) {
            const nowMoment = moment();
            let targetMoment = moment(nextPrayerInfo.time, "HH:mm");
            if (targetMoment.isBefore(nowMoment)) targetMoment.add(1, 'days');
            const duration = moment.duration(targetMoment.diff(nowMoment));
            const timer = [Math.floor(duration.asHours()), duration.minutes(), duration.seconds()]
                          .map(v => String(v).padStart(2, '0')).join(':');
            document.getElementById('cd-text').innerText = `${nextPrayerInfo.name} -${timer}`;
        }
    }
    setInterval(updateLive, 1000);

    // KIBLAT BERDASARKAN ROTASI HP
    window.addEventListener('deviceorientation', function(event) {
        if (event.webkitCompassHeading) {
            // Untuk iOS
            let heading = event.webkitCompassHeading;
            // Kiblat dari Rembang sekitar 294 derajat
            document.getElementById('compass').style.transform = `rotate(${-heading + 294}deg)`;
        } else if (event.alpha) {
            // Untuk Android
            let heading = event.alpha;
            document.getElementById('compass').style.transform = `rotate(${heading + 294}deg)`;
        }
    }, true);

    async function init() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude: lat, longitude: lon } = pos.coords;
            try {
                const geo = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`);
                const res = await geo.json();
                const a = res.address;
                const desa = a.village || a.suburb || "Kedungringin";
                const kec = (a.city_district && !a.city_district.includes("Rembang")) ? a.city_district : "Sedan";
                const kab = a.city || a.regency || "Rembang";
                document.getElementById('full-address').innerText = `Desa ${desa}, Kec. ${kec}, Kab. ${kab}`;
            } catch(e) {
                document.getElementById('full-address').innerText = "Desa Kedungringin, Kec. Sedan, Kab. Rembang";
            }

            const dateStr = moment().format('DD-MM-YYYY');
            const pRes = await fetch(`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${lat}&longitude=${lon}&method=11`);
            const pData = await pRes.json();
            const t = pData.data.timings;
            const dhuha = moment(t.Sunrise, "HH:mm").add(15, 'minutes').format("HH:mm");

            currentPrayerTimes = [
                {name:'Dhuhur', time:t.Dhuhr}, {name:'Ashar', time:t.Asr}, 
                {name:'Maghrib', time:t.Maghrib}, {name:'Isya', time:t.Isha}, 
                {name:'Imsak', time:t.Imsak}, {name:'Subuh', time:t.Fajr}, 
                {name:'Terbit', time:t.Sunrise}, {name:'Dhuha', time:dhuha}
            ];
            renderPrayers();
        });
    }

    function renderPrayers() {
        const nowStr = moment().format('HH:mm');
        const sorted = [...currentPrayerTimes].sort((a,b) => a.time.localeCompare(b.time));
        nextPrayerInfo = sorted.find(p => p.time > nowStr) || sorted.find(p => p.name === 'Imsak');
        let html = '';
        currentPrayerTimes.forEach(p => {
            const isNext = nextPrayerInfo && p.name === nextPrayerInfo.name;
            html += `<div class="prayer-item ${isNext?'next':''}"><span>${p.name}</span><span>${p.time} WIB</span></div>`;
        });
        document.getElementById('prayer-content').innerHTML = html;
    }

    function renderCal() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const m = viewDate.getMonth(), y = viewDate.getFullYear();
        document.getElementById('masehi-month').innerText = moment(viewDate).format('MMMM YYYY');
        ['AHAD','SEN','SEL','RAB','KAM','JUM','SAB'].forEach(d => grid.innerHTML += `<div class="day-name">${d}</div>`);
        const first = new Date(y, m, 1).getDay();
        const last = new Date(y, m + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=last; d++) {
            const dt = new Date(y, m, d);
            const pasaranArr = ['Wage', 'Kliwon', 'Legi', 'Paing', 'Pon'];
            const pasaran = pasaranArr[Math.floor((dt - new Date(1970, 0, 1)) / 86400000) % 5];
            grid.innerHTML += `<div class="date ${moment().isSame(dt, 'day')?'today':''} ${dt.getDay()===0?'sun':''}">
                                <span class="hijri-mini">${moment(dt).format('iD')}</span>${d}
                                <span class="pasaran">${pasaran}</span></div>`;
        }
    }

    // FUNGSI PENGATURAN
    function changeFontSize(size) { document.documentElement.style.setProperty('--font-size', size + 'px'); }
    function changeTheme(color) { 
        document.documentElement.style.setProperty('--primary', color); 
        document.getElementById('colorPicker').value = color;
    }
    function resetDefault() {
        changeTheme(DEFAULT_COLOR);
        changeFontSize(16);
    }

    function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCal(); }

    init(); renderCal(); updateLive();
</script>
</body>
</html>
